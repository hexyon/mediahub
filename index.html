<!DOCTYPE html>
<html>

<head>
  <link href="favicon.ico" rel="icon" type="image/x-icon" />
  <title>Media Hub</title>
  <style>
    /* Import Roboto for body text, fallback to system fonts */
    @font-face {
      font-family: 'Roboto';
      src: url('Roboto/Roboto-Regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Roboto-Bold';
      src: url('Roboto/Roboto-Bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Pacifico';
      src: url('Pacifico/Pacifico-Regular.ttf') format('truetype');
    }

    body {
      font-family: Roboto, Arial, sans-serif;
      margin: 0;
      background: #f9f9f9;
      overflow: hidden;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .image-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: white;
    }

    .background-blur {
      display: none;
    }

    .thumbnail {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.3s ease-in-out;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .thumbnail:hover {
      transform: scale(1.05);
    }

    .control-buttons {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-left: 20px;
    }

    .upload-button,
    .blur-toggle {
      width: 50px;
      height: 50px;
      background: #007bff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      color: #fff;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: background-color 0.3s ease;
    }

    .blur-toggle {
      width: 50px;
      height: 50px;
      background: transparent url('blur.png') no-repeat center;
      background-size: 50px 50px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: all 0.3s ease;
      filter: grayscale(100%);
    }

    .blur-toggle.active {
      background: transparent url('blur.png') no-repeat center;
      background-size: 50px 50px;
      filter: none;
    }

    .full-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.95);
    }

    .full-screen .background-blur {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120%;
      height: 120%;
      background-size: cover;
      background-position: center;
      filter: blur(25px) brightness(0.85);
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.2);
      will-change: background-image, opacity;
    }

    .full-screen .background-blur.visible {
      opacity: 0.9;
      transition: opacity 0.15s ease-out;
    }

    .full-screen img,
    .full-screen video {
      max-width: 90%;
      max-height: 90%;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 1;
    }

    .full-screen video {
      border-radius: 20px;
    }

    .full-screen video::-webkit-media-controls-panel {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
    }


    .arrow {
      position: absolute;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      display: none;
      z-index: 2;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease-in-out;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .arrow::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border: solid #000;
      border-width: 2px 2px 0 0;
      opacity: 0.8;
    }

    .left-arrow {
      left: 24px;
    }

    .left-arrow::before {
      transform: translate(-35%, -50%) rotate(-135deg);
    }

    .right-arrow {
      right: 24px;
    }

    .right-arrow::before {
      transform: translate(-65%, -50%) rotate(45deg);
    }

    .arrow:hover {
      background: rgba(255, 255, 255, 0.95);
      transform: scale(1.05);
    }

    .arrow:active {
      background: rgba(255, 255, 255, 1);
      transform: scale(0.95);
    }

    .exit-button {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      background: url('exit.png') no-repeat;
      background-size: contain;
      border: none;
      outline: none;
      display: none;
      z-index: 2;
    }

    .arrow.hidden {
      opacity: 0;
    }

    #file-input {
      display: none;
    }

    /* ------------------------------------------------------
       List styling for the “Image/Video” menu
       ------------------------------------------------------ */
    .image-list {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 0;
      /* we’ll let each <li> handle its own padding */
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-height: 80vh;
      overflow-y: auto;
      z-index: 3;
      display: none;
    }

    .image-list ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .image-list ul li {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      /* generous hit target */
      font-size: 16px;
      /* matches symbol size if used */
      color: #111;
      /* near-black for maximum contrast */
      border-bottom: 1px solid #E0E0E0;
      /* subtle separator line */
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
    }

    .image-list ul li:last-child {
      border-bottom: none;
    }

    /* “Image”/“Video” label styling */
    .image-list ul li .media-label {
      font-weight: 600;
      /* semibold, HIG style */
      margin-right: 0.5em;
      color: #111;
      flex-shrink: 0;
      /* keep full width of label */
    }

    /* Numeric index (“1.”, “2.”, etc.) */
    .image-list ul li .file-index {
      margin-right: 0.3em;
      color: #111;
      flex-shrink: 0;
    }

    /* File name will truncate if too long */
    .image-list ul li .file-name {
      flex-grow: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Darken/hightlight on hover */
    .image-list ul li:hover {
      background-color: #F5F5F7;
    }

    /* Optional: adjust scrollbar styling to match HIG aesthetic */
    .image-list::-webkit-scrollbar {
      width: 8px;
    }

    .image-list::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .image-list::-webkit-scrollbar-thumb {
      background-color: #C4C4C6;
      border-radius: 4px;
    }

    .image-list::-webkit-scrollbar-thumb:hover {
      background-color: #A0A0A3;
    }

    /* ------------------------------------------------------
       AI Description Panel Styles
       ------------------------------------------------------ */
    .ai-button {
      width: 32px;
      height: 32px;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid #000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 8px;
      font-family: 'Times New Roman', serif;
      font-size: 16px;
      font-style: italic;
      font-weight: normal;
      color: #000;
    }

    .ai-button:hover {
      background: rgba(255, 255, 255, 0.9);
    }

    .ai-button:active {
      background: rgba(255, 255, 255, 0.9);
    }

    .ai-button.active {
      background: rgba(255, 255, 255, 0.95);
      border-color: #000;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .description-panel {
      position: absolute;
      right: 20px;
      top: 60px;
      transform: none;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 16px;
      min-width: 200px;
      max-width: 280px;
      display: none;
      animation: slideInDown 0.3s ease-out;
      z-index: 10;
    }

    .description-panel.visible {
      display: block;
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .description-panel-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .description-panel-close {
      display: none;
    }

    .description-panel-content {
      background: transparent;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Pacifico', cursive;
      font-size: 26px;
      line-height: 1.6;
      color: #111;
    }

    .description-panel-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0;
    }

    .description-panel-loading .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #007bff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .description-panel-loading span {
      font-size: 14px;
      color: #666;
    }

    .description-panel-footer {
      display: none;
    }

    .index-container {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      z-index: 2;
    }

    .full-screen .index {
      font-size: 1.5em;
      color: #000;
      background-color: #f5f5f7;
      padding: 5px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="image-container">
    <div class="background-blur"></div>
    <img class="thumbnail" src="thumbnail.png" />
    <div class="control-buttons">
      <div class="upload-button" onclick="document.getElementById('file-input').click()">+</div>
      <div class="blur-toggle" title="Toggle Background Blur"></div>
    </div>
  </div>

  <input type="file" id="file-input" multiple accept="image/*,video/*">

  <div class="full-screen">
    <div class="background-blur"></div>
    <div class="background-blur"></div>
    <img src="" />
    <video controls style="display: none;"></video>
    <div class="index-container">
      <div class="description-panel">
        <div class="description-panel-header">
          <div class="description-panel-close">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
          </div>
        </div>
        <div class="description-panel-loading" style="display: none;">
          <div class="spinner"></div>
          <span>Analyzing image...</span>
        </div>
        <div class="description-panel-content" style="display: none;">
          <p></p>
        </div>
      </div>
      <div class="ai-button" title="AI Description" style="display: none;">i</div>
      <div class="index"></div>
    </div>
    <div class="exit-button"></div>
    <div class="arrow left-arrow"></div>
    <div class="arrow right-arrow"></div>
  </div>

  <div class="image-list">
    <ul></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="config.js"></script>
  <script>
    $(document).ready(function () {
      $('.full-screen').hide();
      $('.full-screen .index').hide();

      var media = [];
      var fileNames = [];
      var fileTypes = [];
      var currentIndex = 0;
      var blurEnabled = false;
      var preloadedImages = {};  // Cache for preloaded images
      var currentBlurIndex = 0;

      // AI Description state
      var descriptions = [];  // Store descriptions for each media item
      var showDescription = false;
      var isAnalyzing = false;

      // Initialize Supabase client from config
      const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

      function preloadAdjacentImages(index) {
        if (!blurEnabled) return;

        const prevIndex = (index - 1 + media.length) % media.length;
        const nextIndex = (index + 1) % media.length;

        [prevIndex, nextIndex].forEach(idx => {
          if (fileTypes[idx]?.startsWith('image') && !preloadedImages[idx]) {
            const img = new Image();
            img.src = media[idx];
            preloadedImages[idx] = img;
          }
        });
      }

      $('.blur-toggle').click(function () {
        blurEnabled = !blurEnabled;
        $(this).toggleClass('active');

        const $blur = $('.full-screen .background-blur');
        if (blurEnabled) {
          $blur.css('display', 'block');
          preloadAdjacentImages(currentIndex);
        } else {
          $blur.removeClass('visible');
          setTimeout(() => $blur.css('display', 'none'), 150);
        }
      });

      function updateMedia() {
        var currentMedia = media[currentIndex];
        var currentType = fileTypes[currentIndex];

        if (currentType.startsWith('image')) {
          $('.full-screen img').show().attr('src', currentMedia);
          $('.full-screen video').hide()[0].pause();

          if (blurEnabled) {
            const $blurs = $('.full-screen .background-blur');
            const nextBlurIndex = 1 - currentBlurIndex;
            $blurs.eq(nextBlurIndex).css({
              'background-image': `url(${currentMedia})`,
              'display': 'block',
              'opacity': 0.9
            });
            $blurs.eq(currentBlurIndex).css('opacity', 0);
            currentBlurIndex = nextBlurIndex;
            preloadAdjacentImages(currentIndex);
          }
        } else if (currentType.startsWith('video')) {
          $('.full-screen img').hide();
          $('.full-screen video').show().attr('src', currentMedia)[0].play();
          if (blurEnabled) {
            $('.full-screen .background-blur').css({
              'display': 'block',
              'opacity': 0
            });
          }
        }

        $('.full-screen .index').text((currentIndex + 1));

        // Show AI button only for images
        if (currentType.startsWith('image')) {
          $('.ai-button').show();

          // Auto-analyze if description panel is visible
          if (showDescription && !descriptions[currentIndex]) {
            analyzeCurrentImage();
          } else if (showDescription && descriptions[currentIndex]) {
            // Show existing description
            $('.description-panel-content p').text(descriptions[currentIndex]);
            $('.description-panel-loading').hide();
            $('.description-panel-content').show();
          }
        } else {
          $('.ai-button').hide();
          $('.description-panel').removeClass('visible');
          showDescription = false;
        }
      }

      function updateThumbnail(mediaUrl, type) {
        if (type.startsWith('image')) {
          $('.thumbnail').attr('src', mediaUrl);
        } else if (type.startsWith('video')) {
          var video = document.createElement('video');
          video.src = mediaUrl;
          video.addEventListener('loadeddata', function () {
            video.currentTime = 1;
          });
          video.addEventListener('seeked', function () {
            var canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            $('.thumbnail').attr('src', canvas.toDataURL());
          });
        }
      }

      $('.thumbnail').click(function () {
        if (media.length > 0) {
          updateMedia();
          $('.full-screen').show();
          $('.arrow, .exit-button, .full-screen .index').show();
          $('.image-container').hide();
        }
      });

      $(document).keydown(function (e) {
        if ($('.full-screen').is(':visible')) {
          if (e.key === 'ArrowRight') {
            currentIndex = (currentIndex + 1) % media.length;
            $('.arrow.left-arrow').addClass('hidden');
            $('.arrow.right-arrow').removeClass('hidden');
          } else if (e.key === 'ArrowLeft') {
            currentIndex = (currentIndex - 1 + media.length) % media.length;
            $('.arrow.right-arrow').addClass('hidden');
            $('.arrow.left-arrow').removeClass('hidden');
          } else if (e.key === 'Escape') {
            $('.full-screen').hide();
            $('.full-screen .index').hide();
            $('.image-container').show();
            $('.full-screen video')[0].pause();
            updateThumbnail(media[currentIndex], fileTypes[currentIndex]);
            $('.arrow').removeClass('hidden');
            return;
          }
          updateMedia();
        }
      });

      $('.arrow.left-arrow').click(function (e) {
        e.stopPropagation();
        currentIndex = (currentIndex - 1 + media.length) % media.length;
        $('.arrow.right-arrow').addClass('hidden');
        $('.arrow.left-arrow').removeClass('hidden');
        updateMedia();
      });

      $('.arrow.right-arrow').click(function (e) {
        e.stopPropagation();
        currentIndex = (currentIndex + 1) % media.length;
        $('.arrow.left-arrow').addClass('hidden');
        $('.arrow.right-arrow').removeClass('hidden');
        updateMedia();
      });

      $('.arrow.left-arrow').hover(function () {
        $(this).removeClass('hidden');
      });

      $('.arrow.right-arrow').hover(function () {
        $(this).removeClass('hidden');
      });

      $('.exit-button').click(function () {
        $('.full-screen').hide();
        $('.full-screen .index').hide();
        $('.image-container').show();
        $('.full-screen video')[0].pause();
        updateThumbnail(media[currentIndex], fileTypes[currentIndex]);
        $('.arrow').removeClass('hidden');
      });

      /* ------------------------------------------------------
         UPDATED: List generation for “Image/Video”
         ------------------------------------------------------ */
      $('.full-screen .index').click(function () {
        var listHtml = '';
        for (var i = 0; i < media.length; i++) {
          // Use plain text “Image” or “Video” labels in title case
          var typeLabel = fileTypes[i].startsWith('video') ? 'Video' : 'Image';

          listHtml +=
            '<li data-index="' + i + '">' +
            '<span class="media-label">' + typeLabel + '</span>' +
            '<span class="file-index">' + (i + 1) + '.</span>' +
            '<span class="file-name">' + fileNames[i] + '</span>' +
            '</li>';
        }
        $('.image-list ul').html(listHtml);
        $('.image-list').show();
      });

      $('.image-list').on('click', 'li', function () {
        currentIndex = $(this).data('index');
        updateMedia();
        $('.image-list').hide();
      });

      $(document).mouseup(function (e) {
        var container = $(".image-list");
        if (!container.is(e.target) && container.has(e.target).length === 0) {
          container.hide();
        }
      });

      // AI Description Functions
      var currentAnalysisIndex = -1; // Track which image is being analyzed

      async function analyzeCurrentImage() {
        if (isAnalyzing || !media[currentIndex] || !fileTypes[currentIndex].startsWith('image')) {
          return;
        }

        // Check if description already exists
        if (descriptions[currentIndex]) {
          return;
        }

        isAnalyzing = true;
        const requestIndex = currentIndex; // Capture the index for this request
        currentAnalysisIndex = requestIndex;

        $('.description-panel-loading').show();
        $('.description-panel-content').hide();

        try {
          const { data, error } = await supabase.functions.invoke('analyze-image', {
            body: { imageData: media[requestIndex] }
          });

          // Only update if we're still on the same image
          if (requestIndex !== currentIndex) {
            console.log('Discarding outdated analysis result');
            return;
          }

          if (error) {
            console.error('Error analyzing image:', error);
            $('.description-panel-content p').text('Failed to analyze image');
            $('.description-panel-loading').hide();
            $('.description-panel-content').show();
            return;
          }

          if (data?.description) {
            descriptions[requestIndex] = data.description;
            // Double-check we're still on the same image before displaying
            if (requestIndex === currentIndex) {
              $('.description-panel-content p').text(data.description);
            }
          } else {
            if (requestIndex === currentIndex) {
              $('.description-panel-content p').text('No description available');
            }
          }
        } catch (err) {
          console.error('Error calling analyze-image:', err);
          if (requestIndex === currentIndex) {
            $('.description-panel-content p').text('Failed to connect to AI service');
          }
        } finally {
          isAnalyzing = false;
          if (requestIndex === currentIndex) {
            $('.description-panel-loading').hide();
            $('.description-panel-content').show();
          }
        }
      }

      function toggleDescriptionPanel() {
        showDescription = !showDescription;

        if (showDescription) {
          $('.description-panel').addClass('visible');
          $('.ai-button').addClass('active');

          // Auto-analyze if no description exists
          if (!descriptions[currentIndex] && !isAnalyzing) {
            analyzeCurrentImage();
          } else if (descriptions[currentIndex]) {
            // Show existing description
            $('.description-panel-content p').text(descriptions[currentIndex]);
            $('.description-panel-loading').hide();
            $('.description-panel-content').show();
          }
        } else {
          $('.description-panel').removeClass('visible');
          $('.ai-button').removeClass('active');
        }
      }

      // AI Button click handler
      $('.ai-button').click(function (e) {
        e.stopPropagation();
        toggleDescriptionPanel();
      });

      // Description panel close button
      $('.description-panel-close').click(function (e) {
        e.stopPropagation();
        showDescription = false;
        $('.description-panel').removeClass('visible');
        $('.ai-button').removeClass('active');
      });

      // Prevent panel clicks from closing
      $('.description-panel').click(function (e) {
        e.stopPropagation();
      });

      $('#file-input').on('change', function (event) {
        var files = event.target.files;
        for (var i = 0; i < files.length; i++) {
          var reader = new FileReader();
          reader.onload = (function (file) {
            return function (e) {
              media.push(e.target.result);
              fileNames.push(file.name);
              fileTypes.push(file.type);
              descriptions.push('');  // Initialize empty description
              if (media.length === 1) {
                updateThumbnail(e.target.result, file.type);
              }
            };
          })(files[i]);
          reader.readAsDataURL(files[i]);
        }
      });
    });
  </script>
</body>

</html>
